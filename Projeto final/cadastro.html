<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro | CDKL's</title>

    <link rel="stylesheet" href="css/cadastro.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <main class="container">

        <section class="cadastroBox">

            <h1>CDKL's</h1>

            <span>Menos cor, mais estilo.</span>

            <h2>Criar Conta</h2>

            <div id="toast" class="toast"></div>

            <form id="formCadastro">

                <div class="grupo">

                    <label for="nome">

                        Nome Completo

                    </label>

                    <input
                        type="text"
                        id="nome"
                        required
                    >

                </div>

                <div class="grupo">

                    <label for="cpf">

                        CPF

                    </label>

                    <input
                        type="text"
                        id="cpf"
                        required
                    >

                </div>

                <div class="grupo">

                    <label for="cep">

                        CEP

                    </label>

                    <input
                        type="text"
                        id="cep"
                        required
                    >

                </div>

                <div class="grupo">

                    <label for="rua">

                        Rua

                    </label>

                    <input
                        type="text"
                        id="rua"
                        readonly
                    >

                </div>

                <div class="grupo">

                    <label for="bairro">

                        Bairro

                    </label>

                    <input
                        type="text"
                        id="bairro"
                        readonly
                    >

                </div>

                <div class="grupo">

                    <label for="cidade">

                        Cidade

                    </label>

                    <input
                        type="text"
                        id="cidade"
                        readonly
                    >

                </div>

                <div class="grupo">

                    <label for="uf">

                        UF

                    </label>

                    <input
                        type="text"
                        id="uf"
                        readonly
                    >

                </div>

                <div class="grupo">

                    <label for="telefone">

                        Telefone Fixo

                    </label>

                    <input
                        type="text"
                        id="telefone"
                        required
                    >

                </div>

                <div class="grupo">

                    <label for="celular">

                        Celular

                    </label>

                    <input
                        type="text"
                        id="celular"
                        required
                    >

                </div>

                <div class="grupo">

                    <label for="login">

                        Login

                    </label>

                    <input
                        type="text"
                        id="login"
                        maxlength="6"
                        required
                    >

                </div>

                <div class="grupo">

                    <label for="senha">

                        Senha

                    </label>

                    <input
                        type="password"
                        id="senha"
                        maxlength="8"
                        required
                    >

                </div>

                <div class="grupo">

                    <label for="confirmarSenha">

                        Confirmar Senha

                    </label>

                    <input
                        type="password"
                        id="confirmarSenha"
                        maxlength="8"
                        required
                    >

                </div>

                <button type="submit">

                    Cadastrar

                </button>

            </form>

            <p>

                Já possui conta?

                <a href="login.html">

                    Entrar

                </a>

            </p>

        </section>

    </main>

    <script src="js/cadastro.js"></script>

</body>

</html>
